name: Security Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  security-checks:
    uses: sibuthomasmathew/platform-github-workflows/.github/workflows/security-baseline.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      severity: CRITICAL,HIGH
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

